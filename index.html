<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Layout</title>

<style>
body {
  background: #ddd;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
  flex-direction: column;
}

.container {
  display: flex;
  align-items: flex-start;
  gap: 40px;
}

/* Centro */
.centro {
  width: 120px;
  height: 650px;
  border: 10px solid black;
  border-radius: 10px;
}

/* Lados */
.lado {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 30px;
}

/* Parte de cima */
.topo {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}

/* Hexágono */
.hex {
  width: 40px;
  height: 40px;
  background: red;
  clip-path: polygon(
    25% 5%, 75% 5%,
    100% 50%, 75% 95%,
    25% 95%, 0% 50%
  );
  border: 8px solid black;
  box-sizing: border-box;
  cursor: pointer;
}

/* Quadrados pequenos */
.quadrado {
  width: 60px;
  height: 60px;
  border: 8px solid black;
  cursor: pointer;
}

.laranja {
  background: orange;
}

.marrom {
  background: #c96d0c;
}

/* Blocos grandes */
.blocos {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.bloco {
  width: 120px;
  height: 120px;
  border: 10px solid black;
  background: #00ff00;
  cursor: pointer;
}

/* Botão */
.botao {
  margin-top: 20px;
  padding: 10px 20px;
  font-size: 16px;
  border: none;
  background: black;
  color: white;
  cursor: pointer;
  border-radius: 5px;
}

/* Caixa de explicação */
.explicacao {
  margin-top: 15px;
  max-width: 400px;
  background: white;
  padding: 15px;
  border-radius: 8px;
  border: 2px solid black;
  display: none;
  text-align: center;
}

/* Tooltip */
.tooltip {
  position: absolute;
  background: black;
  color: white;
  padding: 6px 10px;
  border-radius: 5px;
  font-size: 14px;
  display: none;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -120%);
  opacity: 0;
  transition: opacity 0.2s ease;
}

.tooltip.show {
  display: block;
  opacity: 1;
}
</style>

</head>
<body>

<div class="container">

  <!-- Lado esquerdo -->
  <div class="lado">
    <div class="topo">
      <div class="hex" onclick="mostrarTooltip(event, 'Indução')"></div>
      <div class="quadrado laranja" onclick="mostrarTooltip(event, 'Gaylord')"></div>
      <div class="hex" onclick="mostrarTooltip(event, 'Indução')"></div>
      <div class="quadrado laranja" onclick="mostrarTooltip(event, 'Gaylord')"></div>
    </div>

    <div class="blocos">
      <div class="bloco" onclick="mostrarTooltip(event, 'Ilha 1')"></div>
      <div class="bloco" onclick="mostrarTooltip(event, 'Ilha 3')"></div>
      <div class="bloco" onclick="mostrarTooltip(event, 'Ilha 5')"></div>
    </div>
  </div>

  <!-- Centro -->
  <div class="centro"></div>

  <!-- Lado direito -->
  <div class="lado">
    <div class="topo">
      <div class="hex" onclick="mostrarTooltip(event, 'Indução')"></div>
      <div class="quadrado marrom" onclick="mostrarTooltip(event, 'Gaylord')"></div>
      <div class="hex" onclick="mostrarTooltip(event, 'Indução')"></div>
      <div class="quadrado laranja" onclick="mostrarTooltip(event, 'Gaylord')"></div>
    </div>

    <div class="blocos">
      <div class="bloco" onclick="mostrarTooltip(event, 'Ilha 2')"></div>
      <div class="bloco" onclick="mostrarTooltip(event, 'Ilha 4')"></div>
      <div class="bloco" onclick="mostrarTooltip(event, 'Ilha 6')"></div>
    </div>
  </div>

</div>

<!-- Botão -->
<button class="botao" onclick="mostrarExplicacao()">Click ou toque 2 vezes</button>

<!-- Texto -->
<div class="explicacao" id="texto">
  Label composta por <br>4 indução <br> 6 bipadores <br>6 pescadores <br>6 movimentadores <br>3 abastecedores <br>3 montagem de scuttle
  <br>HeadCount = 28 <br>
  Meta hora individual = 120 <br>
  Meta hora esteira = 720 <br>
  Meta Dia individual = 840 <br>
  Meta Dia esteira = 5040
</div>

<!-- Tooltip -->
<div class="tooltip" id="tooltip"></div>

<script>
function mostrarExplicacao() {
  const el = document.getElementById("texto");
  el.style.display = el.style.display === "none" ? "block" : "none";
}

function mostrarTooltip(event, texto) {
  const tooltip = document.getElementById("tooltip");

  tooltip.innerText = texto;

  const rect = event.target.getBoundingClientRect();
  const x = rect.left + rect.width / 2 + window.scrollX;
  const y = rect.top + window.scrollY;

  tooltip.style.left = x + "px";
  tooltip.style.top = y + "px";

  tooltip.classList.add("show");

  setTimeout(() => {
    tooltip.classList.remove("show");
  }, 2000);
}
</script>

</body>
</html>
